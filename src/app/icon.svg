<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="8" fill="#6b4cff"/>
  <!-- Scissors blades -->
  <!-- Top blade -->
  <g stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none">
    <circle cx="9" cy="10" r="3.5" fill="#6b4cff" stroke="#fff" stroke-width="2"/>
    <line x1="11.5" y1="12" x2="24" y2="20"/>
    <!-- Bottom blade -->
    <circle cx="9" cy="22" r="3.5" fill="#6b4cff" stroke="#fff" stroke-width="2"/>
    <line x1="11.5" y1="20" x2="24" y2="12"/>
  </g>
  <!-- Pivot dot -->
  <circle cx="16" cy="16" r="1.5" fill="#fff"/>
</svg>
